name: Bootstrap blueYosys

"on":
  push:
    branches:
      - agent/initialize-blueyosys
    paths:
      - .github/workflows/bootstrap.yml
      - scripts/bootstrap_from_ulx3s.sh

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: agent/initialize-blueyosys
          fetch-depth: 0

      - name: Import, reorganize, and validate ulx3s_bsv
        run: bash scripts/bootstrap_from_ulx3s.sh

      - name: Run repository lint
        run: make lint

      - name: Commit migrated repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Initialize multi-board blueYosys hierarchy [skip ci]"
          git push origin HEAD:agent/initialize-blueyosys
